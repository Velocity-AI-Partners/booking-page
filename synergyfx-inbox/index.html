</head>
<body>
<style>
  :root{
    --accent:#155eef; --accent-600:#1149c0; --accent-050:#eaf1ff;
    --ink:#101828; --muted:#667085; --faint:#98a2b3;
    --bg:#f4f6fb; --panel:#ffffff; --border:#e6e9f1; --border-soft:#eef1f7;
    --showed:#067647; --showed-bg:#e7f6ec;
    --confirmed:#155eef; --confirmed-bg:#eaf1ff;
    --upcoming:#b25e00; --upcoming-bg:#fff4e3;
    --cancelled:#b42318; --cancelled-bg:#fee4e2;
    --consult:#0e7490; --consult-bg:#e0f2fe;
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  .zp-shell{font-family:var(--sans); color:var(--ink); background:var(--bg); height:100vh; min-height:100dvh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden}
  .zp-shell *{font-family:inherit}

  .zp-top{flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:0 16px; height:56px; background:var(--panel); border-bottom:1px solid var(--border)}
  .zp-loc{display:flex; align-items:center; gap:10px; padding-right:14px; border-right:1px solid var(--border-soft)}
  .zp-mark{width:30px; height:30px; border-radius:8px; flex:0 0 auto; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:13px}
  .zp-loc b{font-size:14px; font-weight:650; line-height:1.1}
  .zp-loc span{display:block; font-size:11px; color:var(--muted); margin-top:1px}
  .zp-page-title{font-size:14px; font-weight:600}

  .zp-body{flex:1 1 auto; display:flex; min-height:0}
  .zp-rail{flex:0 0 56px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 0}
  .zp-rail button{width:38px; height:38px; border:0; background:transparent; border-radius:9px; color:var(--faint); display:grid; place-items:center; cursor:pointer}
  .zp-rail button:hover{background:var(--bg); color:var(--muted)}
  .zp-rail button.on{background:var(--accent-050); color:var(--accent)}
  .zp-rail svg{width:19px; height:19px}

  .zp-list{flex:0 0 344px; max-width:344px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0}
  .zp-list-head{padding:14px 14px 0; border-bottom:1px solid var(--border-soft)}
  .zp-list-head h2{margin:0 0 11px; font-size:15px; font-weight:650}
  .zp-tabs{display:flex; gap:6px; margin-bottom:12px}
  .zp-tab{flex:1 1 auto; font-size:12px; font-weight:600; color:var(--muted); background:var(--bg); border:1px solid var(--border-soft); padding:6px 4px; border-radius:9px; cursor:pointer; text-align:center; display:flex; flex-direction:column; gap:1px}
  .zp-tab b{font-size:14px; font-variant-numeric:tabular-nums}
  .zp-tab:hover{color:var(--ink)}
  .zp-tab.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .zp-search{position:relative; margin-bottom:12px}
  .zp-search svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--faint)}
  .zp-search input{width:100%; padding:8px 10px 8px 32px; font-size:13px; color:var(--ink); border:1px solid var(--border); border-radius:9px; background:#fbfcfe; outline:none}
  .zp-search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-050)}
  .zp-rows{flex:1 1 auto; overflow-y:auto; min-height:0}
  .zp-row{width:100%; text-align:left; border:0; background:transparent; cursor:pointer; display:flex; gap:11px; padding:12px 14px; border-bottom:1px solid var(--border-soft); border-left:3px solid transparent}
  .zp-row:hover{background:#fafbfe}
  .zp-row.on{background:var(--accent-050); border-left-color:var(--accent)}
  .zp-av{width:36px; height:36px; flex:0 0 auto; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:650; color:#fff}
  .zp-row-main{flex:1 1 auto; min-width:0}
  .zp-row-top{display:flex; align-items:baseline; gap:8px}
  .zp-row-name{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .zp-row-time{margin-left:auto; font-size:11px; color:var(--faint); flex:0 0 auto; font-variant-numeric:tabular-nums; white-space:nowrap}
  .zp-row-snip{font-size:12.5px; color:var(--muted); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .zp-row-foot{display:flex; align-items:center; gap:7px; margin-top:7px; flex-wrap:wrap}

  .zp-tp{font-size:10.5px; font-weight:650; padding:2px 8px; border-radius:999px; white-space:nowrap}
  .zp-tp.inquiry{color:var(--accent); background:var(--accent-050)}
  .zp-tp.consult{color:var(--consult); background:var(--consult-bg)}
  .zp-tp.lead{color:var(--upcoming); background:var(--upcoming-bg)}
  .zp-tab{white-space:nowrap}
  .zp-pill{font-size:10.5px; font-weight:650; padding:2px 8px; border-radius:999px; white-space:nowrap}
  .zp-pill.showed{color:var(--showed); background:var(--showed-bg)}
  .zp-pill.confirmed{color:var(--confirmed); background:var(--confirmed-bg)}
  .zp-pill.upcoming{color:var(--upcoming); background:var(--upcoming-bg)}
  .zp-pill.cancelled,.zp-pill.noshow{color:var(--cancelled); background:var(--cancelled-bg)}
  .zp-mini{font-size:11px; color:var(--faint)}

  .zp-detail{flex:1 1 auto; display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--bg)}
  .zp-dhead{background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:flex-start; gap:14px}
  .zp-back{display:none; border:0; background:transparent; cursor:pointer; color:var(--muted); padding:4px; margin:-4px 2px -4px -4px}
  .zp-dhead .zp-av{width:44px; height:44px; font-size:15px}
  .zp-dmeta{flex:1 1 auto; min-width:0}
  .zp-dname{font-size:16px; font-weight:680; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .zp-chipsrow{display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:8px}
  .zp-contact{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted)}
  .zp-contact svg{width:14px; height:14px; color:var(--faint); flex:0 0 auto}
  .zp-interest{font-size:11px; font-weight:600; color:var(--accent-600); background:var(--accent-050); padding:3px 9px; border-radius:999px}

  .zp-scroll{flex:1 1 auto; overflow-y:auto; min-height:0; padding:22px 20px}
  .zp-thread{display:flex; flex-direction:column; gap:16px}
  .zp-msg{max-width:76%; display:flex; flex-direction:column; gap:5px}
  .zp-msg.in{align-self:flex-start}
  .zp-msg.out{align-self:flex-end; align-items:flex-end}
  .zp-bubble{padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .zp-msg.in .zp-bubble{background:var(--panel); border:1px solid var(--border); border-bottom-left-radius:4px}
  .zp-msg.out .zp-bubble{background:var(--accent); color:#fff; border-bottom-right-radius:4px}
  .zp-mt{font-size:10.5px; color:var(--faint); display:flex; align-items:center; gap:7px; font-variant-numeric:tabular-nums}
  .zp-mt b{font-weight:600; color:var(--muted)}
  .zp-chan{font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:1px 6px; border-radius:4px}
  .zp-chan.Form{color:var(--accent); background:var(--accent-050)}
  .zp-chan.SMS{color:var(--showed); background:var(--showed-bg)}
  .zp-chan.Email{color:#6941c6; background:#f4f0ff}

  .zp-sec{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); margin:0 0 12px}
  .zp-bk{display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:12px 14px; margin-bottom:9px}
  .zp-bk-ic{width:34px; height:34px; flex:0 0 auto; border-radius:9px; background:var(--consult-bg); color:var(--consult); display:grid; place-items:center}
  .zp-bk-ic svg{width:17px; height:17px}
  .zp-bk-main{flex:1 1 auto; min-width:0}
  .zp-bk-t{font-size:13.5px; font-weight:600; font-variant-numeric:tabular-nums}
  .zp-bk-s{font-size:11.5px; color:var(--faint); margin-top:2px}

  .zp-compose{flex:0 0 auto; background:var(--panel); border-top:1px solid var(--border); padding:12px 20px}
  .zp-composer{display:flex; gap:10px}
  .zp-composer input{flex:1 1 auto; padding:10px 13px; font-size:13.5px; border:1px solid var(--border); border-radius:10px; background:#fbfcfe; outline:none}
  .zp-composer input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-050)}
  .zp-send{border:0; background:var(--accent); color:#fff; font-weight:600; font-size:13px; padding:0 18px; border-radius:10px; cursor:pointer}
  .zp-send:hover{background:var(--accent-600)}
  .zp-toast{font-size:11.5px; color:var(--accent-600); margin-top:8px; height:14px}

  @media (max-width:760px){
    .zp-rail{display:none}
    .zp-list{flex:1 1 auto; max-width:none}
    .zp-detail{display:none}
    .zp-shell.detail-open .zp-list{display:none}
    .zp-shell.detail-open .zp-detail{display:flex; flex:1 1 auto}
    .zp-back{display:inline-flex; align-items:center}
    .zp-msg{max-width:88%}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  .zp-row:focus-visible,.zp-tab:focus-visible,.zp-send:focus-visible,.zp-rail button:focus-visible,.zp-search input:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
</style>

      var pills='<span class="zp-tp inquiry">Website form</span> '+interest;
      detail.innerHTML=headHTML(i,pills)+
        '<div class="zp-chipsrow" style="padding:0 20px;margin-top:-6px;color:var(--faint)"><span class="zp-contact" style="font-size:12px">'+srcLabel(i.source)+' · '+esc(i.date)+'</span></div>'+
        '<div class="zp-scroll"><div class="zp-thread">'+thread+'</div></div>'+
        '<div class="zp-compose"><div class="zp-composer"><input type="text" placeholder="Type a message..." aria-label="Message"><button class="zp-send" id="zpSend">Send</button></div><div class="zp-toast" id="zpToast"></div></div>';
    } else if(i.type==='consultation'){
      var hist='';
      i.bookings.slice().reverse().forEach(function(b){
        hist+='<div class="zp-bk"><div class="zp-bk-ic">'+calSvg()+'</div><div class="zp-bk-main"><div class="zp-bk-t">'+esc(b.date)+'</div><div class="zp-bk-s">Consultation with Charmaine</div></div><span class="zp-pill '+b.status+'">'+esc(b.statusLabel)+'</span></div>';
      });
      var pills='<span class="zp-tp consult">Consultation</span> <span class="zp-pill '+i.status+'">'+esc(i.statusLabel)+'</span>';
      detail.innerHTML=headHTML(i,pills)+
        '<div class="zp-scroll"><p class="zp-sec">'+i.count+' consultation'+(i.count>1?'s':'')+' booked</p>'+hist+'</div>';
    } else {
      var lp='<span class="zp-tp lead">Lead</span> <span class="zp-pill upcoming">Not booked</span>';
      var sub='Submitted their info'+(i.source&&i.source!=='(unknown)'&&i.source!==''?(' via '+esc(i.source)):'')+(i.program?(' · Interested in '+esc(i.program)):'');
      detail.innerHTML=headHTML(i,lp)+
        '<div class="zp-scroll">'+
          '<p class="zp-sec">Lead details</p>'+
          '<div class="zp-bk"><div class="zp-bk-ic">'+userSvg()+'</div><div class="zp-bk-main"><div class="zp-bk-t">'+esc(i.date)+'</div><div class="zp-bk-s">'+sub+'</div></div></div>'+
          '<div class="zp-bk"><div class="zp-bk-ic" style="background:var(--upcoming-bg);color:var(--upcoming)">'+calSvg()+'</div><div class="zp-bk-main"><div class="zp-bk-t">No consultation booked yet</div><div class="zp-bk-s">A follow-up could invite them to book a call.</div></div></div>'+
        '</div>';
    }
    var back=document.getElementById('zpBack'); if(back) back.onclick=function(){shell.classList.remove('detail-open');};
    var send=document.getElementById('zpSend'); if(send) send.onclick=function(){var t=document.getElementById('zpToast'); t.textContent='Read-only view.'; setTimeout(function(){t.textContent='';},2400);};
  }

  document.getElementById('zpTabs').addEventListener('click',function(e){
    var b=e.target.closest('.zp-tab'); if(!b) return;
    state.filter=b.getAttribute('data-f');
    [].forEach.call(this.children,function(c){c.classList.toggle('on',c===b);});
    var v=visible(); state.active=v.length?v[0].id:null;
    renderList(); renderDetail();
  });
  document.getElementById('zpSearch').addEventListener('input',function(e){state.search=e.target.value.toLowerCase().trim(); renderList();});
  renderList(); renderDetail();
})();
</script>

</body>
</html>
