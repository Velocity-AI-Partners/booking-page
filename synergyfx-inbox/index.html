<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>SynergyFx - Inbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128232;</text></svg>">
<!--
  Login-gated view of SynergyFx's Zen Planner Studio data. This page is public GitHub
  Pages, so it holds no data and no service key: a staff member signs in with the team
  password, which the vap-zp-staff proxy (POST /inbox) checks server-side before
  returning the aggregated read-only feeds. Appointments load asynchronously (the
  server builds them from Studio's calendar; a keep-warm refresher keeps it instant).
-->
<style>
  :root{
    --accent:#314AAE; --accent-600:#26397f; --accent-050:#eef1fb;
    --ink:#111827; --muted:#5b6472; --faint:#9aa1ac;
    --bg:#f6f7f8; --panel:#ffffff; --border:#e5e7eb; --border-soft:#eef0f2;
    --showed:#067647; --showed-bg:#e7f6ec;
    --confirmed:#314AAE; --confirmed-bg:#eef1fb;
    --upcoming:#b25e00; --upcoming-bg:#fff4e3;
    --cancelled:#b42318; --cancelled-bg:#fee4e2;
    --consult:#0e7490; --consult-bg:#e0f2fe;
    --member:#067647; --member-bg:#e7f6ec;
    --input-bg:#fbfcfd; --row-hover:#f6f7f8; --overlay:rgba(17,24,39,.45);
    --logo-mark:#314AAE; --logo-word:#0F172A;
    --nav-w:190px; /* shared: sidebar width AND header logo-cell width, so their divider lines up */
    --sans:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="dark"]{
    /* Neutral black/grey surfaces (no navy). Blue kept only as an accent + on the logo. */
    --accent:#7c93ef; --accent-600:#9db0f4; --accent-050:#26262b;
    --ink:#f4f4f5; --muted:#a1a1aa; --faint:#71717a;
    --bg:#0a0a0b; --panel:#161618; --border:#2c2c31; --border-soft:#232327;
    --showed:#4ade80; --showed-bg:#12261a;
    --confirmed:#9db0f4; --confirmed-bg:#26262b;
    --upcoming:#fbbf24; --upcoming-bg:#2a2410;
    --cancelled:#f87171; --cancelled-bg:#2e1615;
    --consult:#38bdf8; --consult-bg:#0e2530;
    --member:#4ade80; --member-bg:#12261a;
    --input-bg:#121214; --row-hover:#1d1d20; --overlay:rgba(0,0,0,.65);
    --logo-mark:#9db0f4; --logo-word:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased}
  body *{font-family:inherit}

  .zp-login{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
  .zp-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:34px 30px; width:100%; max-width:370px; box-shadow:0 12px 44px rgba(16,24,40,.10)}
  .zp-lgmark{width:46px; height:46px; border-radius:12px; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:16px; margin:0 auto 16px}
  .zp-card h1{font-size:19px; font-weight:680; text-align:center; margin:0 0 24px}
  .zp-field{margin-bottom:13px}
  .zp-field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px}
  .zp-field input{width:100%; padding:10px 12px; font-size:14px; color:var(--ink); border:1px solid var(--border); border-radius:10px; background:var(--input-bg); outline:none}
  .zp-field input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-050)}
  .zp-signin{width:100%; padding:11px; font-size:14px; font-weight:650; color:#fff; background:var(--accent); border:0; border-radius:10px; cursor:pointer; margin-top:8px}
  .zp-signin:hover{background:var(--accent-600)}
  .zp-signin:disabled{opacity:.6; cursor:default}
  .zp-err{font-size:12.5px; color:var(--cancelled); text-align:center; min-height:16px; margin-top:12px}

  .zp-shell{height:100vh; min-height:100dvh; display:none; flex-direction:column; overflow:hidden}
  .zp-top{flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:0; height:56px; background:var(--panel); border-bottom:1px solid var(--border)}
  .zp-loc{display:flex; align-items:center; gap:10px; padding-right:14px; border-right:1px solid var(--border-soft)}
  .zp-mark{width:30px; height:30px; border-radius:8px; flex:0 0 auto; background:var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:13px}
  .zp-loc b{font-size:14px; font-weight:650; line-height:1.1}
  .zp-loc span{display:block; font-size:11px; color:var(--muted); margin-top:1px}
  .zp-page-title{flex:0 0 auto; font-size:14px; font-weight:600; color:var(--muted); white-space:nowrap}
  .zp-asof{margin-left:auto; font-size:11px; color:var(--faint); font-weight:500; display:flex; align-items:center; gap:6px}
  .zp-dot{width:6px; height:6px; border-radius:50%; background:var(--showed); display:inline-block}

  .zp-body{flex:1 1 auto; display:flex; min-height:0}

  .zp-nav{flex:0 0 var(--nav-w); background:var(--panel); border-right:1px solid var(--border); padding:14px 10px; display:flex; flex-direction:column; gap:4px}
  .zp-nav button{display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:0; background:transparent; cursor:pointer; padding:9px 12px; border-radius:9px; font-size:13px; font-weight:600; color:var(--muted)}
  .zp-nav button:hover{background:var(--bg); color:var(--ink)}
  .zp-nav button.on{background:var(--accent-050); color:var(--accent-600)}
  .zp-nav b{margin-left:auto; font-size:12px; font-variant-numeric:tabular-nums; font-weight:650}
  .zp-nav svg{width:16px; height:16px; flex:0 0 auto}

  .zp-list{flex:0 0 330px; max-width:330px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0}
  .zp-list-head{padding:14px 14px 0; border-bottom:1px solid var(--border-soft)}
  .zp-list-head h2{margin:0 0 11px; font-size:15px; font-weight:650}
  .zp-search{position:relative; margin-bottom:12px}
  .zp-search svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--faint)}
  .zp-search input{width:100%; padding:8px 10px 8px 32px; font-size:13px; color:var(--ink); border:1px solid var(--border); border-radius:9px; background:var(--input-bg); outline:none}
  .zp-search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-050)}
  .zp-filter{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .zp-filter:empty{display:none}
  .zp-fchip{font-size:11.5px; font-weight:600; padding:5px 11px; border-radius:999px; border:1px solid var(--border); background:var(--input-bg); color:var(--muted); cursor:pointer; white-space:nowrap; line-height:1.1}
  .zp-fchip:hover{border-color:var(--accent)}
  .zp-fchip.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .zp-fchip b{font-weight:700; opacity:.7; margin-left:5px; font-variant-numeric:tabular-nums}
  .zp-rows{flex:1 1 auto; overflow-y:auto; min-height:0}
  .zp-row{width:100%; text-align:left; border:0; background:transparent; cursor:pointer; display:flex; gap:11px; padding:12px 14px; border-bottom:1px solid var(--border-soft); border-left:3px solid transparent}
  .zp-row:hover{background:var(--row-hover)}
  .zp-row.on{background:var(--accent-050); border-left-color:var(--accent)}
  .zp-av{width:36px; height:36px; flex:0 0 auto; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:650; color:#fff}
  .zp-row-main{flex:1 1 auto; min-width:0}
  .zp-row-top{display:flex; align-items:baseline; gap:8px}
  .zp-row-name{font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .zp-row-time{margin-left:auto; font-size:11px; color:var(--faint); flex:0 0 auto; font-variant-numeric:tabular-nums; white-space:nowrap}
  .zp-row-snip{font-size:12.5px; color:var(--muted); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .zp-row-foot{display:flex; align-items:center; gap:7px; margin-top:7px; flex-wrap:wrap}

  .zp-tp{font-size:10.5px; font-weight:650; padding:2px 8px; border-radius:999px; white-space:nowrap}
  .zp-tp.inquiry{color:var(--accent); background:var(--accent-050)}
  .zp-tp.consult{color:var(--consult); background:var(--consult-bg)}
  .zp-tp.appt{color:var(--confirmed); background:var(--confirmed-bg)}
  .zp-tp.lead{color:var(--upcoming); background:var(--upcoming-bg)}
  .zp-tp.member{color:var(--member); background:var(--member-bg)}
  .zp-pill{font-size:10.5px; font-weight:650; padding:2px 8px; border-radius:999px; white-space:nowrap}
  .zp-pill.showed{color:var(--showed); background:var(--showed-bg)}
  .zp-pill.confirmed{color:var(--confirmed); background:var(--confirmed-bg)}
  .zp-pill.upcoming{color:var(--upcoming); background:var(--upcoming-bg)}
  .zp-pill.cancelled{color:var(--cancelled); background:var(--cancelled-bg)}
  .zp-note{border:1px solid var(--border-soft); border-radius:10px; padding:10px 12px; margin-bottom:8px; background:var(--input-bg)}
  .zp-note-h{font-size:11px; color:var(--faint); margin-bottom:4px; font-weight:600}
  .zp-note-t{font-size:12.5px; color:var(--ink); white-space:pre-wrap; word-break:break-word; line-height:1.45}

  .zp-cal{flex:1 1 auto; display:none; min-width:0; min-height:0; overflow:auto; background:var(--bg); padding:16px}
  .zp-cal-grid{display:grid; grid-template-columns:repeat(7, minmax(150px,1fr)); gap:10px; min-width:1080px}
  .zp-cal-day{background:var(--panel); border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:column; min-height:200px}
  .zp-cal-day.today{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent)}
  .zp-cal-dhead{padding:9px 11px; border-bottom:1px solid var(--border-soft); font-size:12px; font-weight:650}
  .zp-cal-dhead span{display:block; font-size:10.5px; font-weight:600; color:var(--faint); margin-top:1px}
  .zp-cal-day.today .zp-cal-dhead{color:var(--accent-600)}
  .zp-cal-items{padding:8px; display:flex; flex-direction:column; gap:6px}
  .zp-cal-it{border:1px solid var(--border-soft); border-left:3px solid var(--confirmed); border-radius:8px; padding:7px 9px; background:var(--input-bg)}
  .zp-cal-it.consult{border-left-color:var(--consult); background:var(--consult-bg)}
  .zp-cal-t{font-size:11px; font-weight:700; color:var(--muted); font-variant-numeric:tabular-nums}
  .zp-cal-n{font-size:12.5px; font-weight:600; margin-top:2px}
  .zp-cal-s{font-size:11px; color:var(--faint); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .zp-cal-none{font-size:11.5px; color:var(--faint); text-align:center; padding:14px 4px}
  .zp-cal-loading{margin:auto; color:var(--faint); font-size:14px; padding:60px; text-align:center}
  .zp-cal-it{cursor:pointer}
  .zp-cal-it:hover{border-color:var(--accent); box-shadow:0 1px 6px rgba(16,24,40,.08)}
  .zp-wk{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .zp-wk button{border:1px solid var(--border); background:var(--panel); color:var(--ink); font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:9px; cursor:pointer}
  .zp-wk button:hover{border-color:var(--accent); color:var(--accent-600)}
  .zp-wk .zp-wk-label{font-size:13.5px; font-weight:650}
  .zp-wk .zp-wk-cur{margin-left:2px; font-size:12px; color:var(--accent-600); background:var(--accent-050); border-color:var(--accent-050)}
  .zp-modal{position:fixed; inset:0; background:var(--overlay); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px}
  .zp-modal-card{background:var(--panel); border-radius:14px; width:100%; max-width:420px; box-shadow:0 18px 60px rgba(16,24,40,.25); overflow:hidden}
  .zp-modal-head{display:flex; align-items:center; gap:10px; padding:15px 18px; border-bottom:1px solid var(--border)}
  .zp-modal-head b{font-size:15.5px}
  .zp-modal-x{margin-left:auto; border:0; background:transparent; cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:4px}
  .zp-modal-body{padding:10px 18px 16px}
  .zp-forms{flex:1 1 auto; display:none; min-width:0; min-height:0; background:var(--bg); padding:16px; gap:14px}
  .zp-form-col{flex:1 1 50%; min-width:0; display:flex; flex-direction:column; background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden}
  .zp-form-head{padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; font-weight:650; display:flex; align-items:center; justify-content:space-between}
  .zp-form-head a{font-size:11.5px; font-weight:600; color:var(--accent-600); text-decoration:none}
  .zp-form-head a:hover{text-decoration:underline}
  .zp-form-shot{flex:1 1 auto; min-height:0; overflow:auto; display:block}
  .zp-form-shot img{width:100%; display:block}
  .zp-form-shot:hover{opacity:.93}
  @media (max-width:900px){ .zp-forms{flex-direction:column} }

  .zp-detail{flex:1 1 auto; display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--bg)}
  .zp-dhead{background:var(--panel); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:flex-start; gap:14px}
  .zp-back{display:none; border:0; background:transparent; cursor:pointer; color:var(--muted); padding:4px; margin:-4px 2px -4px -4px}
  .zp-dhead .zp-av{width:44px; height:44px; font-size:15px}
  .zp-dmeta{flex:1 1 auto; min-width:0}
  .zp-dname{font-size:16px; font-weight:680; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .zp-chipsrow{display:flex; flex-wrap:wrap; gap:8px 14px; margin-top:8px}
  .zp-contact{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted)}
  .zp-contact svg{width:14px; height:14px; color:var(--faint); flex:0 0 auto}
  .zp-interest{font-size:11px; font-weight:600; color:var(--accent-600); background:var(--accent-050); padding:3px 9px; border-radius:999px}

  .zp-scroll{flex:1 1 auto; overflow-y:auto; min-height:0; padding:22px 20px}
  .zp-sec{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); margin:0 0 12px}
  .zp-bk{display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:12px 14px; margin-bottom:9px}
  .zp-bk-ic{width:34px; height:34px; flex:0 0 auto; border-radius:9px; background:var(--consult-bg); color:var(--consult); display:grid; place-items:center}
  .zp-bk-ic svg{width:17px; height:17px}
  .zp-bk-main{flex:1 1 auto; min-width:0}
  .zp-bk-t{font-size:13.5px; font-weight:600; font-variant-numeric:tabular-nums}
  .zp-bk-s{font-size:11.5px; color:var(--faint); margin-top:2px}
  .zp-empty{margin:auto; text-align:center; color:var(--faint); font-size:14px; padding:40px}
  .zp-kv{display:flex; gap:12px; padding:8px 0; border-bottom:1px solid var(--border-soft)}
  .zp-kv:last-child{border-bottom:0}
  .zp-kv-k{flex:0 0 108px; color:var(--muted); font-weight:600; font-size:12px; padding-top:1px}
  .zp-kv-v{flex:1 1 auto; color:var(--ink); font-size:13px; word-break:break-word; white-space:pre-wrap}
  .zp-kvcard{background:var(--panel); border:1px solid var(--border); border-radius:11px; padding:6px 14px 10px; margin-bottom:9px}

  @media (max-width:900px){
    .zp-nav{flex:0 0 auto; flex-direction:row; overflow-x:auto; border-right:0; border-bottom:1px solid var(--border); padding:8px 10px}
    .zp-nav button{width:auto; white-space:nowrap}
    .zp-body{flex-direction:column}
    .zp-list{flex:1 1 auto; max-width:none; border-right:0}
    .zp-detail{display:none}
    .zp-shell.detail-open .zp-nav{display:none}
    .zp-shell.detail-open .zp-list{display:none}
    .zp-shell.detail-open .zp-detail{display:flex; flex:1 1 auto}
    .zp-back{display:inline-flex; align-items:center}
    .zp-page-title{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  .zp-row:focus-visible,.zp-nav button:focus-visible,.zp-signin:focus-visible,.zp-search input:focus-visible,.zp-field input:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* --- Velocity logo (inline SVG, theme-aware) --- */
  .velo-mark{display:block; width:auto}
  .velo-mark path{fill:var(--logo-mark)}
  .velo-lockup{display:block; width:auto; height:30px}
  .velo-lockup .vm{fill:var(--logo-mark)}
  .velo-lockup .vw{fill:var(--logo-word); font-family:var(--sans); font-weight:800}
  .velo-lockup .vp{fill:var(--logo-mark); font-family:var(--sans); font-weight:700}
  .zp-brand{flex:0 0 var(--nav-w); box-sizing:border-box; display:flex; align-items:center; height:100%; padding-left:20px; padding-right:12px; border-right:1px solid var(--border); text-decoration:none}
  .zp-brand .velo-lockup{height:28px}
  .zp-client{flex:0 1 auto; min-width:0; font-size:14px; font-weight:680; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .zp-crumb{flex:0 0 auto; color:var(--faint); font-size:15px}
  @media (max-width:900px){ .zp-brand{flex:0 0 auto; width:auto; padding-left:14px} }
  .zp-lgmark .velo-mark{height:24px}
  .zp-lgmark .velo-mark path{fill:#fff}

  /* --- List head: constant client name + active-tab chip --- */
  .zp-list-titlerow{display:flex; align-items:baseline; gap:10px; justify-content:space-between; margin:0 0 11px}
  .zp-list-titlerow h2{margin:0; font-size:14.5px; font-weight:680; line-height:1.25}
  .zp-tabname{flex:0 0 auto; font-size:11px; font-weight:650; color:var(--accent-600); background:var(--accent-050); padding:3px 10px; border-radius:999px; white-space:nowrap}

  /* --- Sidebar action stack (pinned bottom-left, never past the sidebar) --- */
  .zp-nav-foot{margin-top:auto; display:flex; flex-direction:column; gap:6px; padding-top:12px; border-top:1px solid var(--border-soft)}
  .zp-nav-foot .zp-fbtn{width:100%; justify-content:flex-start; border:1px solid var(--border); background:var(--panel); color:var(--muted); padding:8px 11px; border-radius:9px; font-size:12.5px; font-weight:600}
  .zp-nav-foot .zp-fbtn:hover{background:var(--bg); border-color:var(--accent); color:var(--accent-600)}
  .zp-nav-foot .zp-fbtn-out:hover{border-color:var(--cancelled); color:var(--cancelled)}
  .zp-nav-foot .zp-asof{margin:8px 4px 2px; font-size:11px}
  @media (max-width:900px){
    .zp-nav-foot{margin-top:0; flex-direction:row; align-items:center; padding-top:0; border-top:0; border-left:1px solid var(--border-soft); margin-left:6px; padding-left:10px}
    .zp-nav-foot .zp-fbtn{width:auto}
    .zp-nav-foot .zp-asof{display:none}
  }
  .zp-fbtn{display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); background:var(--panel); color:var(--muted); font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:9px; cursor:pointer}
  .zp-fbtn:hover{border-color:var(--accent); color:var(--accent-600)}
  .zp-fbtn svg{width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex:0 0 auto}
  .zp-fbtn-out:hover{border-color:var(--cancelled); color:var(--cancelled)}
  .zp-fbtn.spin svg{animation:zpspin .8s linear infinite}
  @keyframes zpspin{to{transform:rotate(360deg)}}
  .zp-fbtn .ic-sun{display:none}
  html[data-theme="dark"] .zp-fbtn .ic-moon{display:none}
  html[data-theme="dark"] .zp-fbtn .ic-sun{display:inline}
</style>
<script>(function(){try{var t=localStorage.getItem('sfxtheme');if(t!=='dark'&&t!=='light')t='light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
</head>
<body>

<div class="zp-login" id="zpLogin">
  <form class="zp-card" id="zpLoginForm" autocomplete="on">
    <div class="zp-lgmark"><svg class="velo-mark" viewBox="0 0 123 110" aria-hidden="true"><path d="M45,1 L123,1 L116,14 L37,14 Z"/><path d="M0,28 L104,28 L59,108 L66,44 L11,43 Z"/><path d="M27,57 L49,57 L38,80 Z"/></svg></div>
    <h1>Synergy FX Strength &amp; Wellness Lab</h1>
    <div class="zp-field"><label for="lgPass">Team password</label><input id="lgPass" type="password" autocomplete="current-password"></div>
    <button class="zp-signin" id="lgBtn" type="submit">Sign in</button>
    <div class="zp-err" id="lgErr"></div>
  </form>
</div>

<div class="zp-shell" id="zpShell">
  <header class="zp-top">
    <a class="zp-brand" href="https://velocityaipartners.ai" target="_blank" rel="noopener" aria-label="Velocity AI Partners">
      <svg class="velo-lockup" viewBox="0 0 600 150" aria-hidden="true"><g transform="translate(2,22) scale(0.945)"><path class="vm" d="M45,1 L123,1 L116,14 L37,14 Z"/><path class="vm" d="M0,28 L104,28 L59,108 L66,44 L11,43 Z"/><path class="vm" d="M27,57 L49,57 L38,80 Z"/></g><text class="vw" x="140" y="99" font-size="78" letter-spacing="0.5">VELOCITY</text><text class="vp" x="144" y="130" font-size="20.5" letter-spacing="8.2">AI PARTNERS</text></svg>
    </a>
    <b class="zp-client">Synergy FX Strength &amp; Wellness Lab</b>
    <span class="zp-crumb" aria-hidden="true">&rsaquo;</span>
    <span class="zp-page-title" id="zpTitle">Appointments</span>
  </header>
  <div class="zp-body">
    <nav class="zp-nav" id="zpNav">
      <button data-v="inquiry"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>Inquiries<b id="nInq">0</b></button>
      <button class="on" data-v="appt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v3M16 3v3"/></svg>Appointments<b id="nAppt">&hellip;</b></button>
      <button data-v="lead"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>Leads<b id="nLead">0</b></button>
      <button data-v="member"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3 19a6 6 0 0 1 12 0M15 5a3.2 3.2 0 0 1 0 6M17 13a6 6 0 0 1 4 6"/></svg>Members<b id="nMem">0</b></button>
      <button data-v="forms"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>Forms</button>
      <div class="zp-nav-foot">
        <button class="zp-fbtn zp-fbtn-out" id="zpSignout" type="button" title="Sign out"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>Sign out</button>
        <button class="zp-fbtn" id="zpTheme" type="button" title="Toggle dark / light mode"><svg class="ic-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg><svg class="ic-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.2 17.2 18.6 18.6M18.6 5.4 17.2 6.8M6.8 17.2 5.4 18.6"/></svg><span id="zpThemeLabel">Dark mode</span></button>
        <button class="zp-fbtn" id="zpRefresh" type="button" title="Refresh all data"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 5v6h-6"/></svg>Refresh</button>
        <div class="zp-asof"><span class="zp-dot"></span><span id="zpAsOf">Loading&hellip;</span></div>
      </div>
    </nav>
    <section class="zp-list">
      <div class="zp-list-head">
        <div class="zp-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="zpSearch" type="text" placeholder="Search by name..." aria-label="Search">
        </div>
        <div class="zp-filter" id="zpFilter"></div>
      </div>
      <div class="zp-rows" id="zpRows"></div>
    </section>
    <section class="zp-detail" id="zpDetail"></section>
    <section class="zp-cal" id="zpCal"></section>
    <section class="zp-forms" id="zpForms">
      <div class="zp-form-col">
        <div class="zp-form-head">Booking page <a href="../synergyfx/" target="_blank" rel="noopener">Open form</a></div>
        <a class="zp-form-shot" href="../synergyfx/" target="_blank" rel="noopener"><img src="assets/form-book.png" alt="SynergyFx booking page preview" loading="lazy"></a>
      </div>
      <div class="zp-form-col">
        <div class="zp-form-head">Contact / lead form <a href="../synergyfx-contact/" target="_blank" rel="noopener">Open form</a></div>
        <a class="zp-form-shot" href="../synergyfx-contact/" target="_blank" rel="noopener"><img src="assets/form-contact.png" alt="SynergyFx contact form preview" loading="lazy"></a>
      </div>
    </section>
  </div>
</div>

<script>
(function(){
  var API='https://vap-zp-staff.fly.dev/inbox';
  var PW=null, state={view:'appt', search:'', active:null, bookedFilter:'all', memberFilter:'member'};
  var DATA={inquiry:[], appt:[], lead:[], member:[], exmember:[]}, apptReady=false, apptWindow=7;
  var WEEKS={}, curWeek=null; // curWeek=null -> rolling current week; else 'YYYY-MM-DD'
  function fmtYMD(t){var d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function weekKey(){return curWeek||'current';}
  var AV=['#314AAE','#7a5af8','#0b8a6c','#c2410c','#0e7490','#9333ea','#b42318','#0369a1'];
  function color(n){var s=0;for(var i=0;i<n.length;i++)s+=n.charCodeAt(i);return AV[s%AV.length];}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function initials(n){return n.split(/\s+/).slice(0,2).map(function(w){return w.charAt(0);}).join('').toUpperCase()||'?';}
  function ts(d){var t=Date.parse(d||'');return isNaN(t)?0:t;}
  function phoneSvg(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5c0 8 7 15 15 15l0-3-4-2-2 2c-3-1-6-4-7-7l2-2-2-4z"/></svg>';}
  function mailSvg(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>';}
  function calSvg(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v3M16 3v3"/></svg>';}
  function fmtDay(iso){var t=Date.parse(iso+'T12:00:00');if(isNaN(t))return iso;return new Date(t).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
  function fmtISO(s){var t=Date.parse(s||'');if(isNaN(t))return s||'';return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  var PINFO={};
  // status omitted (STUDENT/PROSPECT adds nothing) and lastLogDate omitted (a bare
  // date without the note text reads as noise) per user feedback 2026-07-08.
  // "Check-ins" because Studio counts every visit type (classes, PT, red light, PEMF).
  var PLABELS=[['birthDate','Birthday'],['signupDate','Signed up'],['firstAttendanceDate','First visit'],['lastAttendanceDate','Last visit'],['attendanceLast30Days','Check-ins (30 days)'],['trialEndDate','Trial ends'],['phone','Phone'],['email','Email'],['referredBy','Referred by'],['instructor','Instructor'],['salesStaff','Sales staff']];
  function personRowsHTML(p, skip){
    var rows='';
    PLABELS.forEach(function(pair){
      if(skip && skip.indexOf(pair[0])>=0) return;
      var v=p[pair[0]];
      if(v===undefined||v===null||v==='') return;
      if(pair[0]==='gender'&&/nospec/i.test(String(v))) return;
      if(/^\d{4}-\d{2}-\d{2}T/.test(String(v))) v=fmtISO(v);
      rows+='<div class="zp-kv"><span class="zp-kv-k">'+esc(pair[1])+'</span><span class="zp-kv-v">'+esc(v)+'</span></div>';
    });
    (p.customFields||[]).forEach(function(c){
      rows+='<div class="zp-kv"><span class="zp-kv-k">'+esc(c.label)+'</span><span class="zp-kv-v">'+esc(c.value)+'</span></div>';
    });
    return rows;
  }
  // Renders only fields NOT already shown on the card (skip list). If nothing new
  // remains, the whole section disappears rather than repeating known info.
  function loadPersonInfo(elId, params, skip){
    var key=(params.phone||'')+'|'+(params.email||'')+'|'+(params.name||'');
    // Proceed when EITHER target exists: members render info inline (no zpMoreInfo
    // element) but still need this fetch for the Notes section.
    var el=document.getElementById(elId); if(!el && !document.getElementById('zpNotesWrap')) return;
    var render=function(d){
      renderNotes(d);
      var box=document.getElementById(elId); if(!box) return;
      var wrap=document.getElementById(elId+'Wrap')||box;
      var rows=(d && d.found)?personRowsHTML(d.person, skip):'';
      if(!rows){ wrap.style.display='none'; return; }
      wrap.style.display='';
      box.innerHTML=rows;
    };
    if(PINFO[key]){ render(PINFO[key]); return; }
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW,section:'person',name:params.name||'',phone:params.phone||'',email:params.email||''})})
      .then(function(r){return r.json();})
      .then(function(d){ PINFO[key]=d; render(d); })
      .catch(function(){ var box=document.getElementById(elId); if(box){ var wrap=document.getElementById(elId+'Wrap'); (wrap||box).style.display='none'; } });
  }
  function moreBox(){ return '<div id="zpMoreInfoWrap"><p class="zp-sec" style="margin-top:16px">From Zen Planner</p><div class="zp-kvcard" id="zpMoreInfo"><div class="zp-kv"><span class="zp-kv-k">More info</span><span class="zp-kv-v">Loading&hellip;</span></div></div></div>'; }
  // CRM notes (Zen Planner staff-logged notes). Section stays hidden when a person
  // has none; a failed lookup says so instead of pretending there are no notes.
  function notesBox(){ return '<div id="zpNotesWrap" style="display:none"><p class="zp-sec" style="margin-top:16px">Notes</p><div id="zpNotes"></div></div>'; }
  function renderNotes(d){
    var wrap=document.getElementById('zpNotesWrap'); if(!wrap) return;
    var box=document.getElementById('zpNotes');
    if(d && d.notesError){ wrap.style.display=''; box.innerHTML='<div class="zp-note"><div class="zp-note-t">Notes could not be loaded right now.</div></div>'; return; }
    var ns=(d && d.notes)||[];
    if(!ns.length){ wrap.style.display='none'; return; }
    wrap.style.display='';
    box.innerHTML=ns.map(function(n){
      var head=[n.category, n.date?fmtISO(n.date):''].filter(Boolean).join(' - ');
      return '<div class="zp-note">'+(head?'<div class="zp-note-h">'+esc(head)+'</div>':'')+'<div class="zp-note-t">'+esc(String(n.message).replace(/\r\n/g,'\n'))+'</div></div>';
    }).join('');
  }
  // Pre-filled "From Zen Planner" card from data already baked into the roster (member
  // backfill), so no per-open fetch. Returns '' when nothing new remains to show.
  function moreBoxInline(info, skip){
    if(!info) return '';
    var rows=personRowsHTML(info, skip);
    if(!rows) return '';
    return '<div id="zpMoreInfoWrap"><p class="zp-sec" style="margin-top:16px">From Zen Planner</p><div class="zp-kvcard">'+rows+'</div></div>';
  }

  var rows=document.getElementById('zpRows'), detail=document.getElementById('zpDetail'), shell=document.getElementById('zpShell');
  var TITLES={inquiry:'Inquiries', appt:'Appointments', lead:'Leads', member:'Members', forms:'Forms'};

  function applyRoster(d){
    var inq=(d.inquiries||[]).map(function(q,ix){
      var name=((q['FIRST NAME']||'')+' '+(q['LAST NAME']||'')).trim()||'(no name)';
      return {id:'q'+ix, name:name, phone:q.PHONE||'', source:q.SOURCE||'', interest:q.INTEREST||'', date:q['INQUIRY DATE']||'', booked:q._booked||null};
    }).sort(function(a,b){return ts(b.date)-ts(a.date);});
    // Members collapse to ONE row per person: Studio's subscription report emits one
    // row per plan (some members hold 8-9), so plans group under the person and render
    // as separate cards in the detail pane.
    var leads=[], mems=[], exmems=[], memByName={};
    (d.people||[]).forEach(function(p,ix){
      if(p.type==='Member'){
        var m=memByName[p.name];
        if(!m){ m={id:'m'+ix, name:p.name, status:p.status, plans:[], phone:p.phone||'', email:p.email||'', info:p.info||null, booked:p.booked||null}; memByName[p.name]=m; mems.push(m); }
        m.plans.push({plan:p.detail, amount:p.amount, autopay:p.autopay, beginDate:p.beginDate, endDate:p.endDate});
        if(!m.phone&&p.phone)m.phone=p.phone; if(!m.email&&p.email)m.email=p.email;
        if(!m.info&&p.info)m.info=p.info; if(!m.booked&&p.booked)m.booked=p.booked;
      }
      else if(p.type==='Ex-member') exmems.push({id:'x'+ix, name:p.name, status:p.status||'Alumni', ex:true, phone:p.phone, email:p.email, booked:p.booked||null});
      else leads.push({id:'l'+ix, name:p.name, phone:p.phone, email:p.email, source:p.source, interest:p.detail, date:p.date, booked:p.booked||null});
    });
    mems.forEach(function(m){
      m.plans.sort(function(a,b){return ts(b.beginDate)-ts(a.beginDate);});
      m.beginDate=m.plans[0].beginDate;
    });
    // Blank-date leads are the RECENTLY-CREATED merge rows (no inquiry date exists in
    // Studio for them); sort them first, not last - ts('')=0 would bury the newest
    // people at the bottom of 700+ rows.
    leads.sort(function(a,b){var ta=a.date?ts(a.date):9e15, tb=b.date?ts(b.date):9e15; return tb-ta;});
    mems.sort(function(a,b){return a.name<b.name?-1:1;});
    exmems.sort(function(a,b){return a.name<b.name?-1:1;});
    DATA.inquiry=inq; DATA.lead=leads; DATA.member=mems; DATA.exmember=exmems;
    document.getElementById('nInq').textContent=inq.length;
    document.getElementById('nLead').textContent=leads.length;
    document.getElementById('nMem').textContent=mems.length;
    document.getElementById('zpAsOf').textContent='Updated '+new Date(d.generatedAt||Date.now()).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    renderAll();
  }
  function applyAppts(d, key){
    var sorted=(d.appointments||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:a.minutes-b.minutes;});
    WEEKS[key||'current']={list:sorted, weekStart:d.weekStart||null};
    if((key||'current')===weekKey()){
      DATA.appt=sorted; apptWindow=d.windowDays||7; apptReady=true;
      if(state.view==='appt') renderAll();
    }
    if((key||'current')==='current') document.getElementById('nAppt').textContent=sorted.length;
  }

  // Members view swaps between current members and ex-members (alumni) via the toggle.
  function curDataset(){
    if(state.view==='member') return state.memberFilter==='ex'?DATA.exmember:DATA.member;
    return DATA[state.view]||[];
  }
  function searchBase(){
    return curDataset().filter(function(i){
      return !state.search || i.name.toLowerCase().indexOf(state.search)>=0;
    });
  }
  function visible(){
    var base=searchBase();
    if((state.view==='lead'||state.view==='inquiry') && state.bookedFilter!=='all'){
      var want=state.bookedFilter==='booked';
      base=base.filter(function(i){return !!i.booked===want;});
    }
    return base;
  }
  function fchip(val,label,count,on){
    return '<button class="zp-fchip'+(on?' on':'')+'" data-f="'+val+'">'+esc(label)+(count!=null?'<b>'+count+'</b>':'')+'</button>';
  }
  // Booked/Not booked toggle on Leads + Inquiries; Members/Ex-members toggle on Members.
  function renderFilter(){
    var el=document.getElementById('zpFilter'); if(!el) return;
    var chips='';
    if(state.view==='member'){
      chips+=fchip('member','Members',DATA.member.length,state.memberFilter==='member');
      chips+=fchip('ex','Ex-members',DATA.exmember.length,state.memberFilter==='ex');
    } else if(state.view==='lead'||state.view==='inquiry'){
      var base=searchBase(), nb=0;
      base.forEach(function(i){if(i.booked)nb++;});
      chips+=fchip('all','All',base.length,state.bookedFilter==='all');
      chips+=fchip('booked','Booked',nb,state.bookedFilter==='booked');
      chips+=fchip('notbooked','Not booked',base.length-nb,state.bookedFilter==='notbooked');
    } else { el.innerHTML=''; return; }
    el.innerHTML=chips;
    [].forEach.call(el.querySelectorAll('.zp-fchip'),function(c){
      c.onclick=function(){
        var v=c.getAttribute('data-f');
        if(state.view==='member') state.memberFilter=v; else state.bookedFilter=v;
        var vis=visible(); state.active=vis.length?vis[0].id:null;
        shell.classList.remove('detail-open');
        renderList(); renderDetail();
      };
    });
  }
  function rowMeta(i){
    var bpill=function(i){return i.booked?'<span class="zp-pill confirmed">Booked</span>':'<span class="zp-pill upcoming">Not booked</span>';};
    var bsnip=function(i,fallback){return i.booked?('Booked: '+fmtDay(i.booked.date)+' &middot; '+i.booked.time+(i.booked.isConsult?' (Consultation)':'')):fallback;};
    if(state.view==='inquiry') return {snip:bsnip(i,(i.interest?('Interest: '+i.interest):(i.source||'Inquiry'))), time:i.date, foot:'<span class="zp-tp inquiry">Inquiry</span>'+bpill(i)};
    if(state.view==='lead') return {snip:bsnip(i,(i.interest?('Interested in '+i.interest):'Submitted info, no booking yet')), time:i.date||'New', foot:'<span class="zp-tp lead">Lead</span>'+bpill(i)};
    // Member / Ex-member rows carry no type/status pill: the section (and the
    // Members/Ex-members toggle) already says which they are, so a per-row
    // "Member CURRENT" / "Ex-member Alumni" is redundant on every line.
    if(i.ex) return {snip:i.email||'Former member', time:'', foot:''};
    return {snip:i.plans.map(function(p){return p.plan;}).filter(Boolean).join(' + ')||'Member', time:i.beginDate, foot:''};
  }
  function renderList(){
    renderFilter();
    var v=visible(); rows.innerHTML='';
    if(!v.length){rows.innerHTML='<div class="zp-empty">Nothing here yet.</div>';return;}
    v.forEach(function(i){
      var m=rowMeta(i);
      var b=document.createElement('button');
      b.className='zp-row'+(i.id===state.active?' on':'');
      b.innerHTML='<div class="zp-av" style="background:'+color(i.name)+'">'+esc(initials(i.name))+'</div>'+
        '<div class="zp-row-main"><div class="zp-row-top"><span class="zp-row-name">'+esc(i.name)+'</span><span class="zp-row-time">'+esc(m.time)+'</span></div>'+
        '<div class="zp-row-snip">'+esc(m.snip)+'</div>'+(m.foot?'<div class="zp-row-foot">'+m.foot+'</div>':'')+'</div>';
      b.onclick=function(){state.active=i.id; shell.classList.add('detail-open'); renderList(); renderDetail();};
      rows.appendChild(b);
    });
  }
  function headHTML(i,pills,contacts){
    return '<div class="zp-dhead"><button class="zp-back" id="zpBack" aria-label="Back"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>'+
      '<div class="zp-av" style="background:'+color(i.name)+'">'+esc(initials(i.name))+'</div>'+
      '<div class="zp-dmeta"><div class="zp-dname">'+esc(i.name)+' '+pills+'</div>'+
      '<div class="zp-chipsrow">'+(contacts||'')+'</div></div></div>';
  }
  function kvCard(pairs){
    var h='';
    pairs.forEach(function(p){ if(p[1]) h+='<div class="zp-kv"><span class="zp-kv-k">'+esc(p[0])+'</span><span class="zp-kv-v">'+esc(p[1])+'</span></div>'; });
    return '<div class="zp-kvcard">'+h+'</div>';
  }
  function renderDetail(){
    var i=curDataset().filter(function(x){return x.id===state.active;})[0];
    if(!i){detail.innerHTML='<div class="zp-empty">Select someone to view the details.</div>';return;}
    var contacts=(i.phone?'<span class="zp-contact">'+phoneSvg()+esc(i.phone)+'</span>':'')+(i.email?'<span class="zp-contact">'+mailSvg()+esc(i.email)+'</span>':'');
    if(state.view==='inquiry'){
      var interest=i.interest?'<span class="zp-interest">Interest: '+esc(i.interest)+'</span>':'';
      detail.innerHTML=headHTML(i,'<span class="zp-tp inquiry">Inquiry</span> '+(i.booked?'<span class="zp-pill confirmed">Booked</span> ':'')+interest,contacts)+
        '<div class="zp-scroll"><p class="zp-sec">Inquiry details</p>'+
        kvCard([['Name',i.name],['Received',i.date],['Source',i.source],['Interest',i.interest],['Phone',i.phone],
                ['Booked',i.booked?(fmtDay(i.booked.date)+' '+i.booked.time):'']])+moreBox()+notesBox()+'</div>';
      loadPersonInfo('zpMoreInfo',{name:i.name,phone:i.phone},['status','phone','email']);
    } else if(state.view==='lead'){
      var bookedCard=i.booked
        ?'<div class="zp-bk"><div class="zp-bk-ic">'+calSvg()+'</div><div class="zp-bk-main"><div class="zp-bk-t">'+esc(fmtDay(i.booked.date))+' &middot; '+esc(i.booked.time)+'</div><div class="zp-bk-s">'+(i.booked.isConsult?'Consultation booked':'Appointment booked')+'</div></div><span class="zp-pill confirmed">Booked</span></div>'
        :'<div class="zp-bk"><div class="zp-bk-ic" style="background:var(--upcoming-bg);color:var(--upcoming)">'+calSvg()+'</div><div class="zp-bk-main"><div class="zp-bk-t">No consultation booked yet</div><div class="zp-bk-s">A follow-up could invite them to book a call.</div></div></div>';
      detail.innerHTML=headHTML(i,'<span class="zp-tp lead">Lead</span> '+(i.booked?'<span class="zp-pill confirmed">Booked</span>':'<span class="zp-pill upcoming">Not booked</span>'),contacts)+
        '<div class="zp-scroll"><p class="zp-sec">Lead details</p>'+
        kvCard([['Name',i.name],['Submitted',i.date],['Source',i.source],['Interested in',i.interest],['Phone',i.phone],['Email',i.email]])+
        bookedCard+moreBox()+notesBox()+'</div>';
      loadPersonInfo('zpMoreInfo',{name:i.name,phone:i.phone,email:i.email},['status','phone','email']);
    } else if(i.ex){
      detail.innerHTML=headHTML(i,'',contacts)+
        '<div class="zp-scroll"><p class="zp-sec">Former member</p>'+
        kvCard([['Name',i.name],['Phone',i.phone],['Email',i.email]])+moreBox()+notesBox()+'</div>';
      loadPersonInfo('zpMoreInfo',{name:i.name,phone:i.phone,email:i.email},['status','phone','email']);
    } else {
      // Contact + personal info is backfilled server-side (i.info); render it inline.
      // The lazy fetch still runs for NOTES (and as info fallback when this member
      // didn't resolve in the index - then zpMoreInfo exists and gets filled too).
      var moreInline=moreBoxInline(i.info,['status','phone','email']);
      var planCards=i.plans.map(function(pl){
        return kvCard([['Plan',pl.plan],['Payment',pl.amount],['Autopay',pl.autopay],['Begins',pl.beginDate],['Ends',pl.endDate]]);
      }).join('');
      detail.innerHTML=headHTML(i,'',contacts)+
        '<div class="zp-scroll"><p class="zp-sec">Membership'+(i.plans.length>1?'s ('+i.plans.length+')':'')+'</p>'+
        planCards+(moreInline||moreBox())+notesBox()+'</div>';
      loadPersonInfo('zpMoreInfo',{name:i.name,phone:i.phone,email:i.email},['status']);
    }
    var back=document.getElementById('zpBack'); if(back) back.onclick=function(){shell.classList.remove('detail-open');};
  }
  var calEl=document.getElementById('zpCal'), apptFirstPoll=0;
  function weekBaseTs(){
    if(curWeek) return Date.parse(curWeek+'T12:00:00');
    var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate(),12).getTime();
  }
  function weekNavHTML(){
    var b=weekBaseTs(), end=b+6*86400000;
    var f=function(t){return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'});};
    return '<div class="zp-wk">'+
      '<button id="wkPrev">&larr; Previous week</button>'+
      '<span class="zp-wk-label">'+esc(f(b))+' &ndash; '+esc(f(end))+'</span>'+
      '<button id="wkNext">Next week &rarr;</button>'+
      (curWeek?'<button class="zp-wk-cur" id="wkCur">Back to this week</button>':'')+
      '</div>';
  }
  function wireWeekNav(){
    var shift=function(d){
      var t=weekBaseTs()+d*7*86400000;
      var today=new Date(); today=new Date(today.getFullYear(),today.getMonth(),today.getDate(),12).getTime();
      var k=fmtYMD(t);
      curWeek=(t===today)?null:k;
      var have=WEEKS[weekKey()];
      if(have){DATA.appt=have.list; apptReady=true;}
      else {apptReady=false; DATA.appt=[]; apptFirstPoll=Date.now();}
      renderCal();
      if(!have) fetchAppts();
    };
    var p=document.getElementById('wkPrev'), n=document.getElementById('wkNext'), c=document.getElementById('wkCur');
    if(p) p.onclick=function(){shift(-1);};
    if(n) n.onclick=function(){shift(1);};
    if(c) c.onclick=function(){curWeek=null; var have=WEEKS['current']; if(have){DATA.appt=have.list; apptReady=true;} else {apptReady=false;} renderCal(); if(!have) fetchAppts();};
  }
  function showApptModal(a){
    var old=document.getElementById('zpModal'); if(old) old.remove();
    var wrap=document.createElement('div'); wrap.className='zp-modal'; wrap.id='zpModal';
    var when=fmtDay(a.date)+' &middot; '+esc(a.time)+(a.duration?(' &middot; '+a.duration+' min'):'');
    var kv=[['Client',a.client],['Type',a.type],['When',null],['Coach',a.coach||'(not assigned yet)'],['Location',a.location||''],];
    var rows='';
    kv.forEach(function(p){
      var v=p[0]==='When'?when:esc(p[1]||'');
      if(!v) return;
      rows+='<div class="zp-kv"><span class="zp-kv-k">'+esc(p[0])+'</span><span class="zp-kv-v">'+v+'</span></div>';
    });
    wrap.innerHTML='<div class="zp-modal-card"><div class="zp-modal-head">'+
      '<div class="zp-av" style="background:'+color(a.client)+'">'+esc(initials(a.client))+'</div>'+
      '<b>'+esc(a.client)+'</b>'+(a.isConsult?' <span class="zp-tp consult">Consultation</span>':'')+
      '<button class="zp-modal-x" aria-label="Close">&times;</button></div>'+
      '<div class="zp-modal-body">'+rows+'<div id="zpModalMore"><div class="zp-kv"><span class="zp-kv-k">More info</span><span class="zp-kv-v">Loading&hellip;</span></div></div></div></div>';
    wrap.addEventListener('click',function(e){ if(e.target===wrap||e.target.closest('.zp-modal-x')) wrap.remove(); });
    document.body.appendChild(wrap);
    loadPersonInfo('zpModalMore',{name:a.client});
  }
  calEl.addEventListener('click',function(e){
    var it=e.target.closest('.zp-cal-it'); if(!it) return;
    var idx=parseInt(it.getAttribute('data-i'),10);
    if(!isNaN(idx) && DATA.appt[idx]) showApptModal(DATA.appt[idx]);
  });
  function renderCal(){
    if(!apptReady){
      var waited=apptFirstPoll?Date.now()-apptFirstPoll:0;
      calEl.innerHTML=weekNavHTML()+'<div class="zp-cal-loading">'+(waited>120000
        ?'Appointments are taking longer than usual. The calendar is being rebuilt and will appear here as soon as it\'s ready.'
        :(curWeek?'Loading that week&hellip; (first load of a past week takes a couple of minutes)':'Loading appointments&hellip;'))+'</div>';
      wireWeekNav();
      return;
    }
    var days=[], b=weekBaseTs();
    for(var i=0;i<7;i++) days.push(fmtYMD(b+i*86400000));
    var todayStr=fmtYMD(Date.now());
    var by={};
    DATA.appt.forEach(function(a,ix){a._ix=ix;(by[a.date]=by[a.date]||[]).push(a);});
    var h=weekNavHTML()+'<div class="zp-cal-grid">';
    days.forEach(function(d){
      var t=Date.parse(d+'T12:00:00'), dt=new Date(t);
      var isToday=(d===todayStr);
      var wd=dt.toLocaleDateString('en-US',{weekday:'short'}), md=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      h+='<div class="zp-cal-day'+(isToday?' today':'')+'"><div class="zp-cal-dhead">'+(isToday?'Today':esc(wd))+'<span>'+esc(md)+'</span></div><div class="zp-cal-items">';
      var list=by[d]||[];
      if(!list.length) h+='<div class="zp-cal-none">No appointments</div>';
      list.forEach(function(a){
        h+='<div class="zp-cal-it'+(a.isConsult?' consult':'')+'" data-i="'+a._ix+'"><div class="zp-cal-t">'+esc(a.time)+(a.isConsult?' &middot; Consultation':'')+'</div>'+
           '<div class="zp-cal-n">'+esc(a.client)+'</div>'+
           '<div class="zp-cal-s">'+esc(a.type)+(a.coach?(' &middot; '+esc(a.coach)):'')+'</div></div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
    calEl.innerHTML=h;
    wireWeekNav();
  }
  function setPanes(){
    var isCal=state.view==='appt', isForms=state.view==='forms';
    document.querySelector('.zp-list').style.display=(isCal||isForms)?'none':'flex';
    detail.style.display=(isCal||isForms)?'none':'flex';
    calEl.style.display=isCal?'block':'none';
    var f=document.getElementById('zpForms');
    f.style.display=isForms?'flex':'none';
  }
  function renderAll(){ setPanes(); if(state.view==='appt'){renderCal();} else if(state.view!=='forms'){renderList(); renderDetail();} }

  document.getElementById('zpNav').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b||!b.hasAttribute('data-v')) return;
    state.view=b.getAttribute('data-v'); state.search=''; state.bookedFilter='all'; state.memberFilter='member'; document.getElementById('zpSearch').value='';
    [].forEach.call(this.children,function(c){c.classList.toggle('on',c===b);});
    document.getElementById('zpTitle').textContent=TITLES[state.view];
    var _tn=document.getElementById('zpTabName'); if(_tn) _tn.textContent=TITLES[state.view];
    var v=(state.view==='appt'||state.view==='forms')?[]:visible(); state.active=v.length?v[0].id:null;
    shell.classList.remove('detail-open');
    renderAll();
  });
  document.getElementById('zpSearch').addEventListener('input',function(e){state.search=e.target.value.toLowerCase().trim(); renderList();});

  // ---- Footer controls: refresh-all, dark/light theme, sign-out ----
  function refreshAll(btn){
    if(btn) btn.classList.add('spin');
    var stop=function(){ if(btn) setTimeout(function(){btn.classList.remove('spin');},500); };
    // Re-pull the roster AND force a fresh rebuild of every cached week of appointments.
    WEEKS={}; apptReady=false; apptFirstPoll=Date.now();
    if(state.view==='appt') renderCal();
    fetchAppts();
    Promise.resolve(refresh()).then(stop, stop);
  }
  (function wireFooter(){
    var rb=document.getElementById('zpRefresh');
    if(rb) rb.onclick=function(){ refreshAll(rb); };
    var sb=document.getElementById('zpSignout');
    if(sb) sb.onclick=function(){ try{sessionStorage.removeItem('sfxpw');}catch(e){} PW=null; location.reload(); };
    var tb=document.getElementById('zpTheme');
    function syncThemeLabel(){
      var dark=document.documentElement.getAttribute('data-theme')==='dark';
      var l=document.getElementById('zpThemeLabel'); if(l) l.textContent=dark?'Light mode':'Dark mode';
    }
    if(tb) tb.onclick=function(){
      var nx=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',nx);
      try{localStorage.setItem('sfxtheme',nx);}catch(e){}
      syncThemeLabel();
    };
    syncThemeLabel();
  })();

  function fetchRoster(){
    return fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW})});
  }
  var apptTimer=null;
  function fetchAppts(){
    if(apptTimer){clearTimeout(apptTimer); apptTimer=null;}
    if(!apptFirstPoll) apptFirstPoll=Date.now();
    var key=weekKey();
    var body={password:PW,section:'appointments',days:7};
    if(curWeek) body.start=curWeek;
    fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.json();})
      .then(function(d){
        // A stale payload still renders (better than an empty grid) while the
        // server rebuilds; keep polling until a fresh build lands.
        if(d && d.appointments) applyAppts(d, key);
        if(d && d.building){ if(key===weekKey()){ apptTimer=setTimeout(fetchAppts,6000); if(!d.appointments && state.view==='appt') renderCal(); } return; }
      })
      .catch(function(){ if(key===weekKey()) apptTimer=setTimeout(fetchAppts,15000); });
  }
  async function refresh(){
    if(!PW) return;
    try{ var r=await fetchRoster(); if(r.ok){ applyRoster(await r.json()); } }catch(e){}
  }

  function enter(data){
    applyRoster(data);
    var v=visible(); state.active=v.length?v[0].id:null;
    renderAll();
    document.getElementById('zpLogin').style.display='none';
    shell.style.display='flex';
    fetchAppts();
    setInterval(refresh,180000);
    setInterval(fetchAppts,600000);
  }

  var form=document.getElementById('zpLoginForm'), btn=document.getElementById('lgBtn'), errEl=document.getElementById('lgErr');
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    var pw=document.getElementById('lgPass').value;
    if(!pw){errEl.textContent='Enter the team password.';return;}
    errEl.textContent=''; btn.disabled=true; btn.textContent='Signing in...';
    try{
      PW=pw;
      var r=await fetchRoster();
      if(r.status===403){ errEl.textContent='Wrong password. Try again.'; btn.disabled=false; btn.textContent='Sign in'; PW=null; return; }
      if(!r.ok){ errEl.textContent='Something went wrong. Please try again.'; btn.disabled=false; btn.textContent='Sign in'; PW=null; return; }
      sessionStorage.setItem('sfxpw',pw);
      enter(await r.json());
    }catch(err){
      errEl.textContent='Could not reach the server. Please try again.'; btn.disabled=false; btn.textContent='Sign in'; PW=null;
    }
  });

  // Auto-resume if a password is already in this tab's session.
  var saved=sessionStorage.getItem('sfxpw');
  if(saved){
    PW=saved;
    fetchRoster().then(function(r){
      if(r.ok) return r.json().then(enter);
      PW=null; sessionStorage.removeItem('sfxpw');
    }).catch(function(){ PW=null; });
  }
})();
</script>
</body>
</html>
