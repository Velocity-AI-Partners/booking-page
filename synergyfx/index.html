<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SynergyFx | Book a Consultation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Tokens captured from the live HighLevel/Zen Planner Engage widget via Playwright:
     primary #155EEF, available-day tint rgba(21,94,239,.07), Inter font, 44px circle days. */
  :root{
    --brand:#155eef; --brand-dark:#0f49c0;
    --brand-tint:rgba(21,94,239,.07); --brand-tint2:rgba(21,94,239,.12);
    --ink:#101828; --muted:#667085; --slate:#5f6b7a;
    --line:#e4e7ec; --field:#d0d5dd; --bg:#ffffff;
    --radius:12px; --shadow:0 6px 28px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    color:var(--ink);background:#f7f8fa;display:flex;align-items:center;justify-content:center;padding:30px 16px;
  }
  .card{
    width:100%;max-width:1120px;background:var(--bg);border:1px solid var(--line);border-radius:14px;
    box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:300px 1fr;min-height:640px;
  }
  /* ---------- left info panel (persistent across steps) ---------- */
  .info{padding:26px 24px;border-right:1px solid var(--line);display:flex;flex-direction:column}
  .backbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--brand);
    cursor:pointer;display:none;align-items:center;justify-content:center;margin-bottom:18px}
  .backbtn.show{display:inline-flex}
  .svc-title{font-size:24px;font-weight:700;color:var(--ink);margin:0 0 18px}
  .meta{display:flex;flex-direction:column;gap:13px}
  .meta .row{display:flex;gap:10px;align-items:flex-start;font-size:14px;font-weight:500;color:var(--slate)}
  .meta svg{flex:0 0 17px;width:17px;height:17px;margin-top:1px;color:var(--muted)}
  /* ---------- right stage ---------- */
  .stage{padding:26px 30px;min-width:0}
  .stage h2{margin:0 0 18px;font-size:19px;font-weight:600}
  /* date+time: calendar beside the slot rail */
  .dt{display:grid;grid-template-columns:1fr 250px;gap:30px}
  @media (max-width:880px){.card{grid-template-columns:1fr}.info{border-right:none;border-bottom:1px solid var(--line)}.dt{grid-template-columns:1fr}}
  /* calendar */
  .cal-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px}
  .cal-nav .mname{font-weight:600;font-size:15px;min-width:130px;text-align:center}
  .cal-nav button{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
  .cal-nav .prev{background:#fff;color:var(--muted)}
  .cal-nav .prev:disabled{color:#cdd2db;cursor:not-allowed}
  .cal-nav .next{background:var(--brand-tint2);color:var(--brand)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
  .dow span{text-align:center;font-size:12px;font-weight:600;color:var(--ink);padding:6px 0}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:4px;place-items:center}
  .day{width:44px;height:44px;border-radius:50%;border:none;background:none;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:500;color:var(--ink)}
  .day.empty{visibility:hidden}
  .day.muted{color:#cbd1d9;cursor:default}
  .day.avail{background:var(--brand-tint);color:var(--brand)}
  .day.avail:hover{background:var(--brand-tint2)}
  .day.sel{background:var(--brand);color:#fff}
  .day.today{position:relative}
  .day.today::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:5px;width:4px;height:4px;border-radius:50%;background:var(--brand)}
  .cal-loading{color:var(--muted);font-size:14px;padding:40px 0;text-align:center}
  /* timezone control */
  .tz{margin-top:22px}
  .tz .lbl{font-size:14px;font-weight:600;margin-bottom:8px}
  .tz .ctl{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);padding:2px 0;white-space:nowrap}
  .tz .ctl svg{width:16px;height:16px;flex:0 0 16px;color:var(--muted)}
  .tz .ctl .caret{margin-left:auto;color:var(--brand)}
  /* slot rail */
  /* fixed-height rail: stays the same size on every day, scrolls when there are
     more slots than fit. cards are locked to 50px so they never resize. */
  .rail{display:flex;flex-direction:column;gap:12px;height:482px;overflow-y:auto;padding-right:8px;scrollbar-gutter:stable}
  .rail::-webkit-scrollbar{width:8px}
  .rail::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:8px}
  .rail::-webkit-scrollbar-track{background:transparent}
  .slot{flex:0 0 50px;height:50px;border:1px solid var(--brand);background:#fff;color:var(--brand);border-radius:4px;
    font-family:inherit;font-weight:500;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .slot:hover{background:var(--brand-tint)}
  .slot-row{flex:0 0 50px;display:grid;grid-template-columns:1fr auto;gap:10px}
  .slot.chosen{height:50px;background:var(--slate);color:#fff;border-color:var(--slate);cursor:default}
  .slot-select{border:none;background:var(--brand);color:#fff;border-radius:4px;font-weight:600;font-size:14px;
    padding:0 22px;cursor:pointer;font-family:inherit}
  .rail .none{color:var(--muted);font-size:14px;padding:14px 2px}
  /* form */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 22px}
  .fld{display:flex;flex-direction:column;gap:7px}
  .fld.full{grid-column:1 / -1}
  .fld label{font-size:14px;font-weight:600;color:var(--ink)}
  .fld label .req{color:#f04438;margin-left:2px}
  .fld .inp{position:relative;display:flex;align-items:center}
  .fld input,.fld textarea{width:100%;font:inherit;font-size:14px;padding:13px 14px;border:1px solid var(--field);
    border-radius:8px;outline:none;color:var(--ink)}
  .fld textarea{min-height:96px;resize:vertical}
  .fld input:focus,.fld textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(21,94,239,.13)}
  .fld input.err,.fld textarea.err{border-color:#f04438}
  .fld .with-icon input{padding-left:40px}
  .fld .ic{position:absolute;left:13px;color:var(--muted);pointer-events:none;display:flex}
  .fld .flag{position:absolute;left:11px;display:flex;align-items:center;gap:4px;font-size:13px;color:var(--muted)}
  .fld .with-flag input{padding-left:62px}
  .err-msg{color:#f04438;font-size:12px;font-weight:500;display:none}
  .err-msg.show{display:block}
  .form-foot{display:flex;justify-content:flex-end;margin-top:26px}
  .cta{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:13px 26px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:inherit}
  .cta:hover{background:var(--brand-dark)}
  .cta:disabled{opacity:.6;cursor:progress}
  /* confirmation */
  .confirm{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:440px;gap:14px}
  .check{width:62px;height:62px;border-radius:50%;background:var(--brand-tint);color:var(--brand);display:flex;align-items:center;justify-content:center}
  .confirm h2{margin:0;font-size:21px}
  .confirm p{margin:0;color:var(--muted);max-width:400px;line-height:1.55}
  .note{font-size:12.5px;color:#93701a;background:#fffaeb;border:1px solid #fedf89;border-radius:10px;padding:9px 13px;max-width:400px;line-height:1.5}
  .summary{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:15px 18px;max-width:400px;width:100%;
    text-align:left;display:flex;flex-direction:column;gap:8px;font-size:14px}
  .summary .k{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .summary .v{font-weight:600}
  .linkbtn{background:none;border:none;color:var(--brand);font-weight:600;cursor:pointer;font-size:14px;text-decoration:none}
  /* inline notices / banners (booking response states) */
  .banner{border-radius:10px;padding:11px 14px;font-size:13.5px;line-height:1.5;margin-bottom:16px}
  .banner.err{color:#c53333;background:#fdecec;border:1px solid #f3c2c2}
  .banner a{color:inherit;font-weight:700}
  .form-notice{border-radius:10px;padding:11px 14px;font-size:13.5px;line-height:1.5;margin:0 0 18px}
  .form-notice.err{color:#c53333;background:#fdecec;border:1px solid #f3c2c2}
  .form-notice.warn{color:#93701a;background:#fffaeb;border:1px solid #fedf89}
  .form-notice a{color:var(--brand);font-weight:700}
  /* add-to-calendar buttons on the confirmation card */
  .cal-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:2px}
  .cal-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--brand);color:var(--brand);
    background:#fff;border-radius:8px;padding:9px 16px;font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer}
  .cal-btn:hover{background:var(--brand-tint)}
</style>
</head>
<body>
<div class="card">
  <aside class="info">
    <button class="backbtn" id="backBtn" title="Back" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    </button>
    <h1 class="svc-title">Consultation</h1>
    <div class="meta" id="meta"></div>
  </aside>
  <section class="stage" id="stage"></section>
</div>

<script>
/* =========================================================================
   SynergyFx "Consultation" booking page.
   UX rebuilt to closely match the live HighLevel (Zen Planner Engage) widget at
   eng.zenplanner.com/widget/booking/bhSEctECzfO7DQ95Vs1u (layout, colors, font,
   circular day cells, side-by-side calendar + slot rail, two-tap slot Select,
   and the First/Last/Phone/Email/Notes form) captured from the real widget.

   AVAILABILITY IS REAL: free slots are fetched live from the same PUBLIC HighLevel
   endpoint the real widget uses (no token, CORS-open), so times always match
   SynergyFx's actual calendar.
   ------------------------------------------------------------------------- */
const CALENDAR = {
  id:"bhSEctECzfO7DQ95Vs1u", locationId:"0tJ6VWJysq81q29EWbVS",
  name:"Consultation", slotDurationMin:45, timezone:"America/New_York",
  tzLabel:"America/New_York (EDT)",
  thankYou:"Thank you for scheduling your appointment. We look forward to meeting you!"
};
const SLOTS_ENDPOINT = `https://services.leadconnectorhq.com/calendars/${CALENDAR.id}/free-slots`;

/* Booking now goes through the Velocity backend proxy (synergyfx-booking edge fn,
   token server-side). The proxy keeps CRM writes GATED until SynergyFx approves:
   while gated it returns a "preview" response and writes nothing, so the page shows
   a captured-preview confirmation. Flip SYNERGYFX_LIVE_WRITES on the edge function
   to go live; no page change needed. */
const LIVE_BOOKING = true;
const BOOK_ENDPOINT = "https://jjckotsrhuxxftwmdlwc.supabase.co/functions/v1/synergyfx-booking";

async function fetchAvailability(startMs,endMs){
  const url=`${SLOTS_ENDPOINT}?startDate=${startMs}&endDate=${endMs}&timezone=${encodeURIComponent(CALENDAR.timezone)}`;
  const r=await fetch(url,{headers:{Accept:"application/json"}});
  if(!r.ok) throw new Error("availability request failed");
  const data=await r.json(); const out={};
  for(const [k,v] of Object.entries(data)) if(v&&Array.isArray(v.slots)&&v.slots.length) out[k]=v.slots;
  return out;
}

/* ---------------- helpers ---------------- */
const DOWF=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const stage=document.getElementById("stage");
const metaEl=document.getElementById("meta");
const backBtn=document.getElementById("backBtn");
let view=new Date(); view.setDate(1);
let availability={};
let state={date:null, slot:null, chosen:null};
// Booking lifecycle locks (parity with the main booking page): once a booking
// confirms we hard-lock the submit path; alreadyBooked locks after the backend
// reports the contact already has a future consultation.
let bookingCompleted=false;
let alreadyBooked=false;

const ic={
  clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>',
  globe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>'
};
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function pad(n){return String(n).padStart(2,"0");}
// Render slot times in the calendar's own timezone (America/New_York), NOT the
// visitor's browser-local time. Slot ISO strings carry a -04:00/-05:00 offset, so
// new Date() parses the correct instant and toLocaleTimeString re-projects into ET.
function fmtTime(iso){return new Date(iso).toLocaleTimeString("en-US",{timeZone:CALENDAR.timezone,hour:"2-digit",minute:"2-digit"});}
function endIso(iso){return new Date(new Date(iso).getTime()+CALENDAR.slotDurationMin*60000).toISOString();}
function fmtDateLong(dStr){const d=new Date(dStr+"T12:00:00");return `${DOWF[d.getDay()]}, ${MONS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}
// escape untrusted-ish server message strings before injecting as HTML
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
// Reschedule/cancel deep link into the shared reschedule-session page (HighLevel branch)
function rescheduleUrl(bookingId){
  return "https://velocity-ai-partners.github.io/reschedule-session/?location=synergyfx&crm=highlevel&booking="+
    encodeURIComponent(bookingId)+"&calendarId="+encodeURIComponent(CALENDAR.id);
}
// Client-side add-to-calendar (no backend): Google Calendar template URL + an ICS
// data-URI download. Times are emitted in UTC (Z) which both Google and ICS accept.
function calStamp(dt){return dt.getUTCFullYear()+pad(dt.getUTCMonth()+1)+pad(dt.getUTCDate())+"T"+pad(dt.getUTCHours())+pad(dt.getUTCMinutes())+pad(dt.getUTCSeconds())+"Z";}
function calendarLinks(startIso,bookingId){
  const start=new Date(startIso);
  const end=new Date(start.getTime()+CALENDAR.slotDurationMin*60000);
  const title="Consultation with SynergyFx";
  const details="Your consultation with SynergyFx."+(bookingId?(" Confirmation #: "+bookingId):"");
  const s=calStamp(start), e=calStamp(end);
  const gcal="https://calendar.google.com/calendar/render?action=TEMPLATE"+
    "&text="+encodeURIComponent(title)+"&dates="+s+"/"+e+"&details="+encodeURIComponent(details);
  const ics=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//SynergyFx//Booking//EN","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT","UID:"+(bookingId||("sfx-"+Date.now()))+"@synergyfx","DTSTAMP:"+calStamp(new Date()),
    "DTSTART:"+s,"DTEND:"+e,"SUMMARY:"+title,"DESCRIPTION:"+details,"END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  return {gcal:gcal, icsHref:"data:text/calendar;charset=utf-8,"+encodeURIComponent(ics)};
}

function renderMeta(){
  let cal="";
  if(state.chosen) cal=`${fmtTime(state.chosen)} - ${fmtTime(endIso(state.chosen))} , ${fmtDateLong(state.date)}`;
  else if(state.date) cal=fmtDateLong(state.date);
  const rows=[`<div class="row">${ic.clock}<span>${CALENDAR.slotDurationMin} min</span></div>`];
  if(cal) rows.push(`<div class="row">${ic.cal}<span>${cal}</span></div>`);
  rows.push(`<div class="row">${ic.globe}<span>${CALENDAR.tzLabel}</span></div>`);
  metaEl.innerHTML=rows.join("");
}

/* ---------------- step: date + time ---------------- */
async function renderDateTime(notice){
  backBtn.classList.remove("show");
  renderMeta();
  const y=view.getFullYear(), m=view.getMonth();
  const now=new Date(); const prevDisabled=(y===now.getFullYear()&&m===now.getMonth());
  stage.innerHTML=`
    ${notice?`<div class="banner err">${esc(notice)}</div>`:""}
    <h2>Select Date &amp; Time</h2>
    <div class="dt">
      <div class="left">
        <div class="cal-nav">
          <button class="prev" id="prev" ${prevDisabled?"disabled":""} aria-label="Previous month">&#8249;</button>
          <div class="mname">${MON[m]} ${y}</div>
          <button class="next" id="next" aria-label="Next month">&#8250;</button>
        </div>
        <div class="dow">${DOWF.map(d=>`<span>${d}</span>`).join("")}</div>
        <div class="grid" id="grid"><div class="cal-loading" style="grid-column:1/8">Loading availability&hellip;</div></div>
        <div class="tz">
          <div class="lbl">Time zone</div>
          <div class="ctl">${ic.globe}<span>GMT-04:00 ${CALENDAR.tzLabel}</span><span class="caret">&#9662;</span></div>
        </div>
      </div>
      <div class="rail" id="rail"></div>
    </div>`;
  stage.querySelector("#prev").onclick=()=>{ if(!prevDisabled){ view.setMonth(m-1); renderDateTime(); } };
  stage.querySelector("#next").onclick=()=>{ view.setMonth(m+1); renderDateTime(); };

  try{ availability=await fetchAvailability(Date.UTC(y,m,1), Date.UTC(y,m+1,1)-1); }
  catch(e){ stage.querySelector("#grid").innerHTML=`<div class="cal-loading" style="grid-column:1/8;color:#f04438">Could not load availability. Please refresh.</div>`; return; }

  // auto-select first available date in this month (matches the real widget)
  const availDates=Object.keys(availability).sort();
  if(!state.date || !availability[state.date]){
    state.date = availDates.find(d=>{const dd=new Date(d+"T12:00:00");return dd.getFullYear()===y&&dd.getMonth()===m;}) || null;
    state.slot=null; state.chosen=null;
  }
  paintGrid(y,m); paintRail(); renderMeta();
}

function paintGrid(y,m){
  const startDow=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayStr=ymd(new Date());
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<button class="day empty"></button>`;
  for(let d=1;d<=days;d++){
    const ds=ymd(new Date(y,m,d));
    const avail=(availability[ds]||[]).length>0;
    const cls=["day"];
    if(ds===state.date) cls.push("sel"); else if(avail) cls.push("avail"); else cls.push("muted");
    if(ds===todayStr) cls.push("today");
    cells+=`<button class="${cls.join(' ')}" ${avail?`data-date="${ds}"`:"disabled"}>${d}</button>`;
  }
  const grid=stage.querySelector("#grid"); grid.innerHTML=cells;
  grid.querySelectorAll("[data-date]").forEach(b=> b.onclick=()=>{ state.date=b.dataset.date; state.slot=null; state.chosen=null; paintGrid(y,m); paintRail(); renderMeta(); });
}

function paintRail(){
  const rail=stage.querySelector("#rail");
  const slots=availability[state.date]||[];
  if(!slots.length){ rail.innerHTML=`<div class="none">No open times. Pick another day.</div>`; return; }
  rail.innerHTML=slots.map(s=>{
    if(s===state.slot){
      return `<div class="slot-row">
        <div class="slot chosen">${fmtTime(s)}</div>
        <button class="slot-select" data-go="${s}">Select</button></div>`;
    }
    return `<button class="slot" data-iso="${s}">${fmtTime(s)}</button>`;
  }).join("");
  rail.querySelectorAll("[data-iso]").forEach(b=> b.onclick=()=>{ state.slot=b.dataset.iso; paintRail(); });
  const go=rail.querySelector("[data-go]"); if(go) go.onclick=()=>{ state.chosen=go.dataset.go; renderForm(); };
}

/* ---------------- step: enter details ---------------- */
function renderForm(){
  backBtn.classList.add("show");
  backBtn.onclick=()=>{ state.chosen=null; renderDateTime(); };
  renderMeta();
  stage.innerHTML=`
    <h2>Enter Details</h2>
    <form id="bookForm" novalidate>
      <div class="form-grid">
        <div class="fld"><label>First Name<span class="req">*</span></label>
          <div class="inp"><input name="firstName" autocomplete="given-name"/></div>
          <span class="err-msg">Required</span></div>
        <div class="fld"><label>Last Name<span class="req">*</span></label>
          <div class="inp"><input name="lastName" autocomplete="family-name"/></div>
          <span class="err-msg">Required</span></div>
        <div class="fld"><label>Phone<span class="req">*</span></label>
          <div class="inp with-flag"><span class="flag">&#127482;&#127480; &#9662;</span><input name="phone" type="tel" placeholder="(201) 555-0123" autocomplete="tel"/></div>
          <span class="err-msg">Enter a valid phone</span></div>
        <div class="fld"><label>Email<span class="req">*</span></label>
          <div class="inp with-icon"><span class="ic">${ic.mail||'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>'}</span><input name="email" type="email" autocomplete="email"/></div>
          <span class="err-msg">Enter a valid email</span></div>
        <div class="fld full"><label>Additional Information</label>
          <div class="inp"><textarea name="notes" placeholder="Is there anything you would like us to know before your appointment?"></textarea></div></div>
      </div>
      <div class="form-foot"><button class="cta" type="submit">Schedule Meeting</button></div>
    </form>`;
  stage.querySelector("#bookForm").onsubmit=onSubmit;
}

// Put a dismissable inline notice at the top of the details form.
function showFormNotice(form,kind,html){
  if(!form) return;
  let el=form.querySelector(".form-notice");
  if(!el){ el=document.createElement("div"); el.className="form-notice"; form.insertBefore(el,form.firstChild); }
  el.className="form-notice "+kind;
  el.innerHTML=html;
}
// Graceful, retryable error (network / 5xx / unknown). No alert(); offer to call the studio.
function showBookingError(form,btn,msg){
  showFormNotice(form,"err",
    "<b>We couldn't complete your booking.</b> "+esc(msg||"Something went wrong on our end.")+
    "<br>Please try again, or call the studio to book directly.");
  if(btn){ btn.disabled=false; btn.textContent="Schedule Meeting"; }
}
// Backend reports the contact already has a future consultation. Not retryable:
// leave the button permanently disabled and surface the reschedule/cancel link.
function showAlreadyBooked(form,btn,data){
  alreadyBooked=true;
  const link=data && data.bookingId
    ? ` <a href="${rescheduleUrl(data.bookingId)}" target="_blank" rel="noopener">Reschedule or cancel</a>`
    : "";
  showFormNotice(form,"warn",
    "<b>You're already booked.</b> "+esc((data&&data.message)||"You already have an upcoming consultation on file.")+link);
  if(btn){ btn.disabled=true; btn.textContent="Already Booked"; }
}

function onSubmit(e){
  e.preventDefault();
  // Guard: a completed or already-booked state is a no-op (parity with main page lock).
  if(bookingCompleted||alreadyBooked) return;
  const form=e.target; const f=Object.fromEntries(new FormData(form).entries());
  form.querySelectorAll("input,textarea").forEach(i=>{ i.classList.remove("err"); const m=i.closest(".fld").querySelector(".err-msg"); if(m)m.classList.remove("show"); });
  let ok=true;
  const fail=(n)=>{ const el=form.querySelector(`[name="${n}"]`); el.classList.add("err"); const m=el.closest(".fld").querySelector(".err-msg"); if(m)m.classList.add("show"); ok=false; };
  if(!f.firstName||!f.firstName.trim()) fail("firstName");
  if(!f.lastName||!f.lastName.trim()) fail("lastName");
  if((f.phone||"").replace(/\D/g,"").length<10) fail("phone");
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email||"")) fail("email");
  if(!ok) return;
  const btn=form.querySelector(".cta"); btn.disabled=true; btn.textContent="Scheduling...";
  submitBooking({action:"book",calendarId:CALENDAR.id,startTime:state.chosen,firstName:f.firstName.trim(),lastName:f.lastName.trim(),
    email:f.email.trim(),phone:f.phone.trim(),notes:(f.notes||"").trim()})
    .then(resp=>{
      const data=resp.data||{};
      // success or idempotent replay -> confirmation
      if(data.written===true||data.idempotent===true){ renderConfirmation(f,data); return; }
      // contact already has a future consultation -> permanent lock + reschedule link
      if(data.code==="already_has_booking"){ showAlreadyBooked(form,btn,data); return; }
      // the chosen slot was taken in the meantime -> re-enable and send them back to pick again
      if(data.code==="slot_taken"){
        state.slot=null; state.chosen=null;
        renderDateTime((data.message||"That time was just taken.")+" Please choose another open time.");
        return;
      }
      // any other backend/CRM failure (5xx, {error}, unknown) -> graceful, retryable error
      showBookingError(form,btn,data.message||data.error);
    })
    .catch(err=>{ console.error("Booking submission error:",err); showBookingError(form,btn,"We couldn't reach the booking service."); });
}

async function submitBooking(payload){
  if(LIVE_BOOKING){
    const r=await fetch(BOOK_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    // The contract returns JSON on success AND on 409/5xx, so parse the body regardless
    // of status and let onSubmit branch on the response code.
    let data={};
    try{ data=await r.json(); }catch(e){ data={}; }
    return {status:r.status, data:data};
  }
  await new Promise(res=>setTimeout(res,450));
  return {status:200, data:{written:false, requestId:"req-"+Math.random().toString(36).slice(2,10)}};
}

/* ---------------- step: confirmation ---------------- */
function renderConfirmation(f,res){
  backBtn.classList.remove("show");
  const wrote=res.written!==false;
  // Permanent success lock: once confirmed, the submit path is a no-op.
  bookingCompleted=true;
  const bid=res.bookingId||res.requestId||"";
  const cal=calendarLinks(state.chosen,res.bookingId||"");
  const calBlock=`
      <div class="cal-btns">
        <a class="cal-btn" href="${cal.gcal}" target="_blank" rel="noopener">&#128197; Google Calendar</a>
        <a class="cal-btn" href="${cal.icsHref}" download="consultation-synergyfx.ics">&#128198; Apple / Outlook</a>
      </div>`;
  const reschedBlock=res.bookingId
    ? `<a class="linkbtn" href="${rescheduleUrl(res.bookingId)}" target="_blank" rel="noopener">Reschedule or cancel</a>`
    : "";
  stage.innerHTML=`
    <div class="confirm">
      <div class="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h2>${wrote?"You're booked!":"Request captured"}</h2>
      <p>${wrote?CALENDAR.thankYou:`Thanks, ${esc(f.firstName)}. Your requested time is saved below.`}</p>
      ${wrote?"":`<div class="note">Preview: live booking is off on this shared page, so this was <b>not</b> written to SynergyFx's calendar yet.</div>`}
      <div class="summary">
        <div><div class="k">Service</div><div class="v">SynergyFx &bull; ${CALENDAR.name} (${CALENDAR.slotDurationMin} min)</div></div>
        <div><div class="k">When</div><div class="v">${fmtTime(state.chosen)} - ${fmtTime(endIso(state.chosen))}, ${fmtDateLong(state.date)}</div></div>
        <div><div class="k">Who</div><div class="v">${esc(f.firstName)} ${esc(f.lastName)}</div></div>
        <div><div class="k">Contact</div><div class="v">${esc(f.email)} &bull; ${esc(f.phone)}</div></div>
        <div><div class="k">${wrote?"Confirmation #":"Reference"}</div><div class="v">${esc(bid)}</div></div>
      </div>
      ${calBlock}
      ${reschedBlock}
      <button class="linkbtn" id="again">Book another time</button>
    </div>`;
  stage.querySelector("#again").onclick=()=>{
    // Fresh flow: reset the locks so a new, distinct booking can be made.
    bookingCompleted=false; alreadyBooked=false;
    state={date:null,slot:null,chosen:null}; view=new Date(); view.setDate(1); renderDateTime();
  };
}

renderDateTime();
</script>
</body>
</html>
